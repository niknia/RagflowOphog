version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.Api
    ports:
      - "5000:80"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Data Source=/data/rag.db
      - VectorDatabase__Provider=Chroma
      - Search__Provider=ElasticSearch
      - Chroma__BaseUrl=http://chroma:8000
      - ElasticSearch__Url=http://elasticsearch:9200
      - Ollama__BaseUrl=http://ollama:11434
    volumes:
      - rag_data:/data
    depends_on:
      - chroma
      - elasticsearch
      - ollama

  worker:
    build:
      context: .
      dockerfile: Dockerfile.Worker
    environment:
      - ConnectionStrings__DefaultConnection=Data Source=/data/rag.db
      - VectorDatabase__Provider=Chroma
      - Search__Provider=ElasticSearch
      - Chroma__BaseUrl=http://chroma:8000
      - ElasticSearch__Url=http://elasticsearch:9200
      - Ollama__BaseUrl=http://ollama:11434
    volumes:
      - rag_data:/data
    depends_on:
      - chroma
      - elasticsearch
      - ollama

  chroma:
    image: chromadb/chroma:latest
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/chroma/chroma

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    entrypoint: ["/bin/sh", "-c", "ollama serve & sleep 5 && ollama pull qwen3 && ollama pull bge-m3 && wait"]
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

volumes:
  rag_data:
  chroma_data:
  elasticsearch_data:
  ollama_data:
